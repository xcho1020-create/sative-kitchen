<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sative Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --orange:    #ff9500;
      --orange-d:  #cc7700;
      --orange-l:  #fff4e0;
      --gray:      #646464;
      --gray-l:    #f0efed;
      --gray-m:    #d4d2ce;
      --beige:     #baa58a;
      --beige-l:   #f5f0e8;
      --black:     #000000;
      --white:     #ffffff;
      --bg:        #f7f5f2;
      --surface:   #ffffff;
      --border:    #d4d2ce;
      --text:      #000000;
      --sub:       #646464;
      --green:     #2a7a46;
      --green-l:   #e8f5ee;
      --green-b:   #b2d9c0;
      --red:       #cc1a2e;
      --red-l:     #fde8ea;
      --red-b:     #f5b8c0;
      --font:      'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      --radius:    5px;
      --radius-lg: 8px;
      --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --nav-h:     52px;
      --bottom-h:  56px;
    }

    /* ── Base ─────────────────────────────────────────────── */
    html { font-size: 14px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
      padding-bottom: var(--bottom-h);
    }
    @media (min-width: 640px) { body { padding-bottom: 0; } }

    /* ── Typography ─────────────────────────────────────────── */
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.2px; }
    h3 { font-size: 15px; font-weight: 600; }
    h4 { font-size: 14px; font-weight: 600; }

    /* ── Layout ─────────────────────────────────────────────── */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 8px;
    }
    [data-page] { display: none; }

    /* ── Header ─────────────────────────────────────────────── */
    #header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #header::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--orange);
    }
    #header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--nav-h);
      gap: 12px;
    }
    .logo {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .logo span { color: var(--orange); }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .role-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--sub);
      background: var(--gray-l);
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    /* Desktop nav tabs */
    .nav-tabs {
      display: none;
      align-items: center;
      gap: 0;
      height: 100%;
    }
    .nav-tab {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 16px;
      font-size: 13px;
      font-weight: 400;
      color: var(--sub);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      position: relative;
      top: 1px; /* align border with header bottom border */
    }
    .nav-tab:hover { color: var(--text); background: none; }
    .nav-tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--orange); background: none; }
    @media (min-width: 640px) {
      .nav-tabs { display: flex; }
    }

    /* Mobile bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bottom-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--sub);
      font-size: 10px;
      font-family: var(--font);
      transition: color 0.15s;
      border-radius: 6px;
      margin: 4px;
    }
    .bottom-nav-item.active { color: var(--orange); background: var(--orange-l); }
    .bottom-nav-item svg { width: 20px; height: 20px; }
    @media (min-width: 640px) { .bottom-nav { display: none; } }

    /* ── Buttons ─────────────────────────────────────────────── */
    button { font-family: var(--font); cursor: pointer; border: none; transition: all 0.15s; }
    button:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
      min-height: 34px;
    }
    .btn-primary   { background: var(--orange); color: #fff; border: 1px solid var(--orange); }
    .btn-primary:hover { background: var(--orange-d); border-color: var(--orange-d); }
    .btn-secondary { background: var(--gray-l); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e8e6e2; }
    .btn-ghost     { background: none; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--gray-l); }
    .btn-danger    { background: var(--red); color: #fff; border: 1px solid var(--red); }
    .btn-danger:hover { background: #a8152a; }
    .btn-sm { padding: 5px 10px; font-size: 11px; min-height: 26px; }
    .btn-lg { padding: 12px 20px; font-size: 14px; min-height: 44px; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Pay / unpay */
    .btn-mark-paid   { background: var(--green-l); color: var(--green); border: 1px solid var(--green-b); }
    .btn-mark-paid:hover:not(:disabled)   { background: #d4eedd; }
    .btn-mark-unpaid { background: var(--red-l);   color: var(--red);   border: 1px solid var(--red-b); }
    .btn-mark-unpaid:hover:not(:disabled) { background: #fbd4d8; }

    /* ── Badge ─────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
      border: 1px solid;
    }
    .badge-paid   { background: var(--green-l); color: var(--green); border-color: var(--green-b); }
    .badge-unpaid { background: var(--red-l);   color: var(--red);   border-color: var(--red-b); }

    /* ── Form elements ─────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      transition: border-color 0.15s;
      min-height: 38px;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,149,0,0.12);
    }
    input[type="number"].form-control { -moz-appearance: textfield; }
    input[type="number"].form-control::-webkit-outer-spin-button,
    input[type="number"].form-control::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* qty input in tables */
    .qty-input {
      width: 64px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      text-align: center;
      min-height: 32px;
    }
    .qty-input:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,149,0,0.12);
    }

    /* ── Page header bar ─────────────────────────────────────── */
  .page-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 12px 0 8px;
  gap: 12px;
  }
    .page-header h1 { line-height: 1.2; }
    .page-sub {
      font-size: 12px;
      color: var(--sub);
      margin-top: 2px;
    }

    /* ── Table ─────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .data-table thead tr {
      background: var(--gray-l);
      border-bottom: 1px solid var(--border);
    }
    .data-table thead th {
      padding: 9px 14px;
      font-size: 10px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-align: left;
      white-space: nowrap;
    }
    .data-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .data-table tbody tr:last-child { border-bottom: none; }
    .data-table tbody tr:hover { background: #eceae6; }
    .data-table td {
      padding: 12px 14px;
      font-size: 13px;
      vertical-align: middle;
    }
    .td-name { font-weight: 600; color: var(--text); }
    .td-sub  { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .td-amount { font-weight: 600; font-size: 14px; }
    .td-muted  { color: var(--sub); }
    .td-green  { color: var(--green); font-weight: 600; }
    .td-actions { white-space: nowrap; }
    .td-right { text-align: right; }

    /* ── Delivery list (mobile: stacked cards) ─────────────── */
    .delivery-list { display: flex; flex-direction: column; gap: 1px; }

    /* Mobile card */
  .dl-card {
  background: var(--white);
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  }
    .dl-card:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .dl-card:last-child  { border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
    .dl-card:only-child  { border-radius: var(--radius-lg); }
    .dl-card.is-unpaid   { border-left-color: var(--red); }
    .dl-card.is-paid     { border-left-color: var(--green); }
  .dl-card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
    }
    .dl-date {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }
    .dl-date:hover { color: var(--orange); }
    .dl-amount { font-size: 17px; font-weight: 600; color: var(--text); }
    .dl-amount-label { font-size: 10px; color: var(--sub); text-align: right; margin-top: 1px; }
    .dl-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .dl-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* Desktop: replace cards with table */
    @media (min-width: 640px) {
      .delivery-list { display: block; }
      .dl-card {
        display: none; /* hide mobile cards on desktop */
      }
      .dl-table-wrap { display: block; }
    }
    .dl-table-wrap { display: none; }
    @media (min-width: 640px) { .dl-table-wrap { display: block; } }

    /* ── KPI cards ─────────────────────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .kpi-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .kpi-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .kpi-value {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .kpi-value.green { color: var(--green); }
    .kpi-value.muted { color: var(--sub); }

    /* ── Detail summary card ─────────────────────────────────── */
    .summary-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
    }
    .summary-card h3 { margin-bottom: 12px; }
    .payment-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }
    .payment-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--sub);
    }
    .payment-status-paid   { color: var(--green); font-weight: 600; }
    .payment-status-unpaid { color: var(--red);   font-weight: 600; }
    .meta-text { font-size: 11px; color: var(--sub); margin-top: 4px; }

    /* ── Products form (new delivery) ───────────────────────── */
    .products-form {
      margin-bottom: 16px;
    }

    /* ── Login page ─────────────────────────────────────────── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: var(--bg);
    }
    .login-box {
      width: 100%;
      max-width: 360px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .login-top {
      padding: 32px 28px 24px;
      border-left: 3px solid var(--orange);
    }
    .login-top h1 { font-size: 26px; letter-spacing: -0.5px; }
    .login-top h1 span { color: var(--orange); }
    .login-top p { font-size: 12px; color: var(--sub); margin-top: 4px; }
    .login-body { padding: 0 28px 28px; }
    .role-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
    .role-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .role-btn:hover { border-color: var(--orange); background: var(--orange-l); }
    .role-btn-sub { font-size: 11px; color: var(--sub); font-weight: 400; }
    .role-arrow { color: var(--gray-m); font-size: 16px; }
    .password-panel { padding-top: 4px; }
    .password-panel .form-control { margin-bottom: 10px; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--sub);
      cursor: pointer;
      margin-top: 10px;
      background: none;
      border: none;
      font-family: var(--font);
      padding: 0;
    }
    .back-link:hover { color: var(--text); }

    /* ── Section header inside pages ────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--sub);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 10px;
    }

    /* ── Admin page ─────────────────────────────────────────── */
    .admin-nav { display: flex; gap: 8px; margin-bottom: 20px; }

    /* ── Info / warning notes ────────────────────────────────── */
    .info-note {
      background: var(--orange-l);
      border: 1px solid var(--beige);
      color: var(--gray);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    /* ── Utility ─────────────────────────────────────────────── */
    .loading { padding: 40px; text-align: center; color: var(--sub); font-size: 13px; }
    .empty   { padding: 48px 20px; text-align: center; color: var(--sub); font-size: 13px; }
    .d-flex  { display: flex; }
    .gap-8   { gap: 8px; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mt-4  { margin-top: 4px; }
    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mb-4  { margin-bottom: 4px; }
    .mb-8  { margin-bottom: 8px; }
    .mb-12 { margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header id="header" style="display:none">
    <div class="container">
      <div class="d-flex items-center gap-8" style="height:100%">
        <div class="logo">sative <span>kitchen</span></div>
        <nav class="nav-tabs" id="navTabs"></nav>
      </div>
      <div class="header-right">
        <span class="role-badge" id="roleDisplay"></span>
        <button class="btn btn-ghost btn-sm" onclick="logout()">log out</button>
      </div>
    </div>
  </header>

  <!-- ── Pages ───────────────────────────────────────────────── -->

  <!-- Login -->
  <div data-page="login">
    <div class="login-wrap">
      <div class="login-box">
        <div class="login-top">
          <h1>sative <span>kitchen</span></h1>
          <p>delivery management</p>
        </div>
        <div class="login-body">
          <div id="roleButtons">
            <p class="form-label" style="margin-bottom:10px">select your role</p>
            <div class="role-list">
              <button class="role-btn" onclick="selectRole('executor')">
                <span>
                  <span style="display:block">executor</span>
                  <span class="role-btn-sub">field team</span>
                </span>
                <span class="role-arrow">→</span>
              </button>
              <button class="role-btn" onclick="selectRole('manager')">
                <span>
                  <span style="display:block">manager</span>
                  <span class="role-btn-sub">read-only access</span>
                </span>
                <span class="role-arrow">→</span>
              </button>
              <button class="role-btn" onclick="selectRole('admin')">
                <span>
                  <span style="display:block">admin</span>
                  <span class="role-btn-sub">full access</span>
                </span>
                <span class="role-arrow">→</span>
              </button>
            </div>
          </div>

          <div id="passwordPanel" style="display:none" class="password-panel">
            <p class="form-label" style="margin-bottom:6px" id="selectedRoleName"></p>
            <input type="password" id="rolePassword" class="form-control"
              placeholder="enter password"
              onkeydown="if(event.key==='Enter') loginWithPassword()">
            <button class="btn btn-primary btn-full btn-lg mt-8" onclick="loginWithPassword()">log in</button>
            <button class="back-link" onclick="backToRoles()">← back to roles</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Home -->
  <div data-page="home">
    <div class="container">
      <div class="page-header">
        <div>
          <h1>deliveries</h1>
          <div class="page-sub" id="homeSubtitle"></div>
        </div>
        <button class="btn btn-primary" onclick="showNewDelivery()" id="newBtn">+ new delivery</button>
      </div>
      <div id="deliveriesList" class="loading">loading…</div>
    </div>
  </div>

  <!-- New Delivery -->
  <div data-page="new-delivery">
    <div class="container">
      <div class="page-header">
        <div>
          <button class="btn btn-ghost btn-sm mb-8" onclick="showPage('home')">← back</button>
          <h1>new delivery</h1>
        </div>
      </div>
      <div class="form-group" style="max-width:200px">
        <label class="form-label">date</label>
        <input type="date" id="deliveryDate" class="form-control">
      </div>
      <div class="section-label">products — enter quantities</div>
      <div id="productsForm" class="products-form loading">loading products…</div>
      <button class="btn btn-primary btn-lg btn-full mt-16" onclick="saveDelivery()">create delivery</button>
    </div>
  </div>

  <!-- Delivery Detail -->
  <div data-page="delivery-detail">
    <div class="container">
      <div class="page-header">
        <div>
          <button class="btn btn-ghost btn-sm mb-8" onclick="showPage('home')">← back</button>
          <h1 id="deliveryDetailTitle">delivery</h1>
        </div>
      </div>
      <div id="deliveryDetailSummary"></div>
      <div id="deliveryEditNotice" class="info-note" style="display:none"></div>
      <div class="section-label">products</div>
      <div id="deliveryDetailProducts"></div>
      <button class="btn btn-primary btn-lg btn-full mt-16" id="saveChangesBtn" onclick="saveDeliveryChanges()" style="display:none">save changes</button>
    </div>
  </div>

  <!-- Admin -->
  <div data-page="admin">
    <div class="container">
      <div class="page-header">
        <h1>admin</h1>
      </div>
      <div class="admin-nav">
        <button class="btn btn-primary" onclick="showPage('admin-products')">manage products</button>
        <button class="btn btn-ghost" onclick="showPage('admin-log')">audit log</button>
      </div>
    </div>
  </div>

  <!-- Admin Products -->
  <div data-page="admin-products">
    <div class="container">
      <div class="page-header">
        <div>
          <button class="btn btn-ghost btn-sm mb-8" onclick="showPage('admin')">← back</button>
          <h1>manage products</h1>
        </div>
      </div>
      <div id="adminProductsList" class="loading">loading…</div>
    </div>
  </div>

  <!-- Admin Log -->
  <div data-page="admin-log">
    <div class="container">
      <div class="page-header">
        <div>
          <button class="btn btn-ghost btn-sm mb-8" onclick="showPage('admin')">← back</button>
          <h1>audit log</h1>
        </div>
      </div>
      <div id="auditLogList" class="loading">loading…</div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" id="bottomNav" style="display:none">
    <button class="bottom-nav-item" id="bnDeliveries" onclick="showPage('home'); loadDeliveries()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="4" width="14" height="12" rx="2"/><path d="M3 8h14"/><path d="M7 12h2M11 12h2"/></svg>
      deliveries
    </button>
    <button class="bottom-nav-item" id="bnNew" onclick="showNewDelivery()" style="display:none">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="10" r="7"/><path d="M10 7v6M7 10h6"/></svg>
      new
    </button>
    <button class="bottom-nav-item" id="bnProfile" onclick="void(0)">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      profile
    </button>
  </nav>

  <script>
    // ============================================================
    // CONFIGURATION & STATE
    // ============================================================
    const AUTH = { executor: '1234', manager: '5678', admin: '9999' };

    let currentUser     = null;
    let currentRole     = null;
    let allProducts     = [];
    let allDeliveries   = [];
    let currentDeliveryId = null;
    let currentDelivery = null;
    let hasChanges      = false;
    let selectedRole    = null;

    // ============================================================
    // DATE FORMATTING (Asia/Tbilisi)
    // ============================================================
    const TBILISI_TIMEZONE = 'Asia/Tbilisi';
    const dateOnlyFormatter = new Intl.DateTimeFormat('en-CA', {
      timeZone: TBILISI_TIMEZONE, year:'numeric', month:'2-digit', day:'2-digit'
    });
    const dateDisplayFormatter = new Intl.DateTimeFormat('en-GB', {
      timeZone: TBILISI_TIMEZONE, day:'2-digit', month:'short', year:'numeric'
    });
    const dateTimeFormatter = new Intl.DateTimeFormat('en-GB', {
      dateStyle:'medium', timeStyle:'short', timeZone: TBILISI_TIMEZONE
    });

    function formatDate(value) {
      if (!value) return 'No date';
      try {
        if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value.trim())) {
          const [y,m,d] = value.trim().split('-');
          return dateDisplayFormatter.format(new Date(+y, +m-1, +d));
        }
        const date = new Date(value);
        if (isNaN(date.getTime())) return 'Invalid date';
        return dateDisplayFormatter.format(date);
      } catch(e) { return 'Invalid date'; }
    }

    function formatDateTime(value) {
      if (!value) return '';
      try {
        const date = new Date(value);
        if (isNaN(date.getTime())) return '';
        return dateTimeFormatter.format(date);
      } catch(e) { return ''; }
    }

    function normalizeDeliveryDate(value) {
      if (!value) return '';
      try {
        if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value.trim())) return value.trim();
        const date = new Date(value);
        if (isNaN(date.getTime())) return '';
        return dateOnlyFormatter.format(date);
      } catch(e) { return ''; }
    }

    // ============================================================
    // UTILITIES
    // ============================================================
    function getCurrentRole() { return sessionStorage.getItem('userRole') || currentRole || 'executor'; }
    function canSeeCost()   { const r=getCurrentRole(); return r==='admin'||r==='executor'; }
    function canSeeMargin() { const r=getCurrentRole(); return r==='admin'||r==='executor'; }
    function normalizePaymentStatus(v) {
      if (v===null||v===undefined) return 'unpaid';
      return String(v).trim().toLowerCase()==='paid'?'paid':'unpaid';
    }
    const round2 = v => Math.round((Number(v)||0)*100)/100;
    const ensureNumber = v => { const n=Number(v); return Number.isFinite(n)?n:0; };
    function formatQuantity(v) { const n=Number(v)||0; return Number.isInteger(n)?n.toString():n.toFixed(2); }
    function formatCurrency(v, digits=2) { return (Number(v)||0).toFixed(digits); }
    function formatMoney(v) {
      if (typeof v==='string') v=Number(v.replace(/\s/g,'').replace(',','.'));
      v=Number(v);
      return Number.isFinite(v)?v.toFixed(2)+'₾':'0.00₾';
    }

    // ============================================================
    // API
    // ============================================================
    const API_BASE_URL = '/api/proxy';

    async function apiFetch(url, options={}, retries=1) {
      try {
        const res = await fetch(url, options);
        return await res.json();
      } catch(err) {
        console.error('API Error:', err);
        if (retries>0) {
          await new Promise(r=>setTimeout(r,500));
          return apiFetch(url, options, retries-1);
        }
        return { success:false, error:err.message };
      }
    }
    async function apiCall(action, params={}) {
      const url = new URL(API_BASE_URL, window.location.origin);
      url.searchParams.append('action', action);
      Object.keys(params).forEach(k=>url.searchParams.append(k,params[k]));
      return apiFetch(url.toString());
    }
    async function apiPost(action, data) {
      return apiFetch(API_BASE_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action,data})
      });
    }

    // ============================================================
    // AUTH
    // ============================================================
    function selectRole(role) {
      selectedRole = role;
      document.getElementById('roleButtons').style.display = 'none';
      const panel = document.getElementById('passwordPanel');
      panel.style.display = 'block';
      document.getElementById('selectedRoleName').textContent = role;
      document.getElementById('rolePassword').value = '';
      document.getElementById('rolePassword').focus();
    }

    function backToRoles() {
      selectedRole = null;
      document.getElementById('roleButtons').style.display = 'block';
      document.getElementById('passwordPanel').style.display = 'none';
    }

    function loginWithPassword() {
      const pwd = document.getElementById('rolePassword').value;
      if (AUTH[selectedRole] === pwd) {
        currentUser = selectedRole;
        currentRole = selectedRole;
        sessionStorage.setItem('userRole', selectedRole);
        document.getElementById('header').style.display = 'block';
        document.getElementById('roleDisplay').textContent = selectedRole;
        document.getElementById('bottomNav').style.display = 'flex';
        buildNav();
        if (selectedRole === 'admin') {
          showPage('admin');
        } else {
          showPage('home');
          loadDeliveries();
        }
      } else {
        document.getElementById('rolePassword').value = '';
        document.getElementById('rolePassword').placeholder = 'wrong password, try again';
        document.getElementById('rolePassword').focus();
      }
    }

    function logout() {
      currentUser = currentRole = null;
      sessionStorage.removeItem('userRole');
      document.getElementById('header').style.display = 'none';
      document.getElementById('bottomNav').style.display = 'none';
      showPage('login');
    }

    // ============================================================
    // NAV
    // ============================================================
    function buildNav() {
      const tabs = document.getElementById('navTabs');
      const bnNew = document.getElementById('bnNew');
      if (!tabs) return;
      tabs.innerHTML = '';

      const pages = currentRole === 'admin'
        ? [['admin','admin'],['admin-products','products'],['admin-log','audit log']]
        : [['home','deliveries'],['new-delivery','new delivery']];

      pages.forEach(([page, label]) => {
        const btn = document.createElement('button');
        btn.className = 'nav-tab';
        btn.textContent = label;
        btn.dataset.navPage = page;
        btn.onclick = () => {
          if (page === 'new-delivery') showNewDelivery();
          else { showPage(page); if(page==='home') loadDeliveries(); }
        };
        tabs.appendChild(btn);
      });

      // show/hide mobile new btn
      if (bnNew) bnNew.style.display = currentRole === 'manager' ? 'none' : 'flex';
    }

    function setActiveNav(page) {
      document.querySelectorAll('.nav-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.navPage === page);
      });
      // bottom nav
      const map = { 'home':'bnDeliveries', 'new-delivery':'bnNew' };
      document.querySelectorAll('.bottom-nav-item').forEach(b=>b.classList.remove('active'));
      if (map[page]) {
        const el = document.getElementById(map[page]);
        if (el) el.classList.add('active');
      }
    }

    // ============================================================
    // NAVIGATION
    // ============================================================
    function showPage(page) {
      document.querySelectorAll('[data-page]').forEach(el=>el.style.display='none');
      const target = document.querySelector(`[data-page="${page}"]`);
      if (target) target.style.display = 'block';
      setActiveNav(page);
      const newBtn = document.getElementById('newBtn');
      if (newBtn) newBtn.style.display = currentRole==='manager'?'none':'';
    }

    // ============================================================
    // DELIVERIES LIST
    // ============================================================
    async function loadDeliveries() {
      const listEl = document.getElementById('deliveriesList');
      if (!listEl) return;
      listEl.innerHTML = '<div class="loading">loading…</div>';

      const result = await apiCall('getDeliveries');

      if (!result.success || !result.data || result.data.length === 0) {
        listEl.innerHTML = '<div class="empty">no deliveries yet</div>';
        // update subtitle
        document.getElementById('homeSubtitle').textContent = '';
        return;
      }

      const parseNum = v => {
        if (v===null||v===undefined||v==='') return 0;
        if (typeof v==='number') return Number.isFinite(v)?v:0;
        const c = String(v).replace(/\s/g,'').replace(',','.');
        const p = Number(c);
        return Number.isFinite(p)?p:0;
      };

      const deliveries = result.data.map(d => {
        let totalCost = parseNum(d.total_cost ?? d.cost_price);
        let totalSell = parseNum(d.total_sell ?? d.sell_price);
        let margin    = parseNum(d.margin);
        if (totalCost===0 && d.items?.length) {
          totalCost = d.items.reduce((s,it)=>s+parseNum(it.quantity)*parseNum(it.cost_price),0);
          totalSell = d.items.reduce((s,it)=>s+parseNum(it.quantity)*parseNum(it.sell_price),0);
          margin = totalSell - totalCost;
        }
        return { ...d, date:normalizeDeliveryDate(d.date), payment_status:normalizePaymentStatus(d.payment_status), total_cost:totalCost, total_sell:totalSell, margin };
      });

      allDeliveries = deliveries;

      const sorted = [...deliveries].sort((a,b)=>{
        const da = a.created_at||a.date||'';
        const db = b.created_at||b.date||'';
        return db.localeCompare(da);
      });

      document.getElementById('homeSubtitle').textContent = `${sorted.length} record${sorted.length!==1?'s':''}`;

      const role = getCurrentRole();
      const showPayCtrl = role==='executor'||role==='manager';
      const canDelete   = role==='executor';
      const showCost    = canSeeCost();
      const showMargin  = canSeeMargin();

      // ── Mobile cards ──────────────────────────────────────────
      const mobileHTML = sorted.map(d => {
        const isPaid = normalizePaymentStatus(d.payment_status)==='paid';
        const sell   = round2(d.total_sell||0);
        return `
          <div class="dl-card ${isPaid?'is-paid':'is-unpaid'}">
            <div class="dl-card-top">
              <div>
                <div class="dl-date" onclick="viewDelivery('${d.id}')">${formatDate(d.date)}</div>
                <div style="margin-top:5px">
                  <span class="badge badge-${isPaid?'paid':'unpaid'}">${isPaid?'paid':'unpaid'}</span>
                </div>
              </div>
              <div style="text-align:right">
                <div class="dl-amount">${formatMoney(sell)}</div>
                <div class="dl-amount-label">sell price</div>
              </div>
            </div>
            <div class="dl-card-bottom">
              <button class="btn btn-ghost btn-sm" onclick="viewDelivery('${d.id}')">view →</button>
              <div class="dl-actions">
                ${showPayCtrl ? `
                  <button class="btn btn-sm btn-mark-paid"   onclick="event.stopPropagation();markDeliveryPaid('${d.id}')"   ${isPaid?'disabled':''}>→ paid</button>
                  <button class="btn btn-sm btn-mark-unpaid" onclick="event.stopPropagation();markDeliveryUnpaid('${d.id}')" ${!isPaid?'disabled':''}>→ unpaid</button>
                ` : ''}
                ${canDelete ? `<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteDelivery('${d.id}')">delete</button>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      // ── Desktop table ─────────────────────────────────────────
      const desktopRows = sorted.map(d => {
        const isPaid = normalizePaymentStatus(d.payment_status)==='paid';
        const sell   = round2(d.total_sell||0);
        const cost   = round2(d.total_cost||0);
        const margin = round2(d.margin||0);
        return `
          <tr>
            <td><span class="td-name" style="cursor:pointer" onclick="viewDelivery('${d.id}')">${formatDate(d.date)}</span></td>
            <td><span class="badge badge-${isPaid?'paid':'unpaid'}">${isPaid?'paid':'unpaid'}</span></td>
            <td class="td-amount">${formatMoney(sell)}</td>
            ${showCost   ? `<td class="td-muted">${formatMoney(cost)}</td>` : ''}
            ${showMargin ? `<td class="${margin>=0?'td-green':'td-amount'}">${formatMoney(margin)}</td>` : ''}
            <td class="td-actions">
              <div class="d-flex gap-8 flex-wrap" style="justify-content:flex-end">
                <button class="btn btn-ghost btn-sm" onclick="viewDelivery('${d.id}')">view →</button>
                ${showPayCtrl ? `
                  <button class="btn btn-sm btn-mark-paid"   onclick="markDeliveryPaid('${d.id}')"   ${isPaid?'disabled':''}>→ paid</button>
                  <button class="btn btn-sm btn-mark-unpaid" onclick="markDeliveryUnpaid('${d.id}')" ${!isPaid?'disabled':''}>→ unpaid</button>
                ` : ''}
                ${canDelete ? `<button class="btn btn-sm btn-danger" onclick="deleteDelivery('${d.id}')">delete</button>` : ''}
              </div>
            </td>
          </tr>`;
      }).join('');

      listEl.innerHTML = `
        <div class="delivery-list">${mobileHTML}</div>
        <div class="dl-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>date</th>
                <th>status</th>
                <th>sell ₾</th>
                ${showCost   ? '<th>cost ₾</th>' : ''}
                ${showMargin ? '<th>margin ₾</th>' : ''}
                <th style="text-align:right">actions</th>
              </tr>
            </thead>
            <tbody>${desktopRows}</tbody>
          </table>
        </div>`;
    }

    // ============================================================
    // DELETE
    // ============================================================
    async function deleteDelivery(id) {
      if (!confirm('delete this delivery?')) return;
      const result = await apiPost('deleteDelivery', { id });
      if (result.success) { loadDeliveries(); }
      else alert('error: ' + (result.error||'unknown'));
    }

    // ============================================================
    // PAYMENT STATUS
    // ============================================================
    async function updateDeliveryPaymentStatus(id, status) {
      const action = status==='paid'?'markDeliveryPaid':'markDeliveryUnpaid';
      const result = await apiPost(action, { id });
      if (result.success) {
        if (Array.isArray(allDeliveries)) {
          const t = allDeliveries.find(d=>String(d.id)===String(id));
          if (t) t.payment_status = status;
        }
        if (currentDelivery && String(currentDelivery.id)===String(id)) {
          currentDelivery.payment_status = status;
          renderDeliverySummary();
        }
        await loadDeliveries();
      } else alert('error: ' + (result.error||'unknown'));
    }
    const markDeliveryPaid   = id => updateDeliveryPaymentStatus(id,'paid');
    const markDeliveryUnpaid = id => updateDeliveryPaymentStatus(id,'unpaid');

    // ============================================================
    // DELIVERY DETAIL
    // ============================================================
    async function viewDelivery(id) {
      currentDeliveryId = id;
      hasChanges = false;
      showPage('delivery-detail');
      document.getElementById('deliveryDetailProducts').innerHTML = '<div class="loading">loading…</div>';

      const result = await apiCall('getDelivery', { id });
      if (!result.success || !result.data) { alert('error loading delivery'); showPage('home'); return; }

      const delivery = result.data;
      currentDelivery = {
        ...delivery,
        payment_status: normalizePaymentStatus(delivery.payment_status),
        date: normalizeDeliveryDate(delivery.date),
        items: (delivery.items||[]).map(it=>({
          ...it, quantity:Number(it.quantity)||0, cost_price:Number(it.cost_price)||0, sell_price:Number(it.sell_price)||0
        }))
      };

      document.getElementById('deliveryDetailTitle').textContent = formatDate(currentDelivery.date);

      const noticeEl = document.getElementById('deliveryEditNotice');
      if (currentDelivery.status==='completed') {
        noticeEl.textContent = 'editing of submitted deliveries is disabled';
        noticeEl.style.display = 'block';
      } else {
        noticeEl.style.display = 'none';
      }

      const canEdit = currentRole==='executor' && currentDelivery.status!=='completed';
      renderDeliverySummary();
      renderDeliveryItems(canEdit);
      document.getElementById('saveChangesBtn').style.display = canEdit?'block':'none';
    }

    function renderDeliverySummary() {
      if (!currentDelivery) return;

      const totals = currentDelivery.items.reduce((acc,it)=>{
        acc.totalCost += (Number(it.quantity)||0)*(Number(it.cost_price)||0);
        acc.totalSell += (Number(it.quantity)||0)*(Number(it.sell_price)||0);
        return acc;
      }, {totalCost:0,totalSell:0});
      totals.totalCost = round2(totals.totalCost);
      totals.totalSell = round2(totals.totalSell);
      const margin = round2(totals.totalSell - totals.totalCost);
      const isPaid = normalizePaymentStatus(currentDelivery.payment_status)==='paid';
      const role   = getCurrentRole();
      const showPayCtrl = role==='executor'||role==='manager';
      const showCost    = canSeeCost();
      const showMargin  = canSeeMargin();
      const createdAt   = formatDateTime(currentDelivery.created_at);
      const updatedAt   = formatDateTime(currentDelivery.updated_at);

      let kpiHTML = '';
      if (showCost)   kpiHTML += `<div class="kpi-card"><div class="kpi-label">cost</div><div class="kpi-value muted">${formatCurrency(totals.totalCost)}₾</div></div>`;
      kpiHTML += `<div class="kpi-card"><div class="kpi-label">sell</div><div class="kpi-value">${formatCurrency(totals.totalSell)}₾</div></div>`;
      if (showMargin) kpiHTML += `<div class="kpi-card"><div class="kpi-label">margin</div><div class="kpi-value green">${formatCurrency(margin)}₾</div></div>`;

      document.getElementById('deliveryDetailSummary').innerHTML = `
        <div class="summary-card">
          <div class="kpi-row">${kpiHTML}</div>
          ${createdAt ? `<div class="meta-text">created ${createdAt}${currentDelivery.created_by?' by '+currentDelivery.created_by:''}</div>` : ''}
          ${updatedAt ? `<div class="meta-text">updated ${updatedAt}${currentDelivery.updated_by?' by '+currentDelivery.updated_by:''}</div>` : ''}
          <div class="payment-row">
            <span class="payment-label">payment: <strong class="payment-status-${isPaid?'paid':'unpaid'}">${isPaid?'paid':'unpaid'}</strong></span>
            ${showPayCtrl ? `
              <div class="d-flex gap-8">
                <button class="btn btn-sm btn-mark-paid"   onclick="markDeliveryPaid('${currentDeliveryId}')"   ${isPaid?'disabled':''}>→ paid</button>
                <button class="btn btn-sm btn-mark-unpaid" onclick="markDeliveryUnpaid('${currentDeliveryId}')" ${!isPaid?'disabled':''}>→ unpaid</button>
              </div>` : ''}
          </div>
        </div>`;
    }

    function renderDeliveryItems(canEdit) {
      if (!currentDelivery) return;
      const showCost = canSeeCost();

      const rows = currentDelivery.items.map((it, idx) => {
        const qty       = Number(it.quantity)||0;
        const costPrice = Number(it.cost_price)||0;
        const sellPrice = Number(it.sell_price)||0;
        const totalCost = round2(qty*costPrice);
        const totalSell = round2(qty*sellPrice);
        return `
          <tr data-index="${idx}">
            <td>
              <div class="td-name">${it.product_name}</div>
              <div class="td-sub">${it.unit}${showCost?' · cost: '+formatCurrency(costPrice,1)+'₾':''} · sell: ${formatCurrency(sellPrice,1)}₾</div>
            </td>
            <td>
              ${canEdit
                ? `<input type="number" step="0.5" min="0" value="${qty}" class="qty-input"
                    data-index="${idx}"
                    oninput="updateDeliveryQuantity(${idx},this.value)"
                    onchange="updateDeliveryQuantity(${idx},this.value)">`
                : `<span data-quantity-display="${idx}">${formatQuantity(qty)}</span>`}
            </td>
            ${showCost ? `<td class="td-muted" data-total-cost="${idx}">${formatCurrency(totalCost)}₾</td>` : ''}
            <td class="td-amount" data-total-sell="${idx}">${formatCurrency(totalSell)}₾</td>
          </tr>`;
      }).join('');

      document.getElementById('deliveryDetailProducts').innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>product</th>
              <th>qty</th>
              ${showCost?'<th>total cost</th>':''}
              <th>total sell</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function updateDeliveryQuantity(index, value) {
      if (!currentDelivery || currentDelivery.status==='completed') return;
      const qty = value===''?0:Math.max(0,parseFloat(value)||0);
      if (!Number.isFinite(qty)) return;
      currentDelivery.items[index].quantity = qty;
      hasChanges = true;
      const costPrice = Number(currentDelivery.items[index].cost_price)||0;
      const sellPrice = Number(currentDelivery.items[index].sell_price)||0;
      const totalCost = round2(qty*costPrice);
      const totalSell = round2(qty*sellPrice);
      const costEl = document.querySelector(`[data-total-cost="${index}"]`);
      if (costEl) costEl.textContent = formatCurrency(totalCost)+'₾';
      const sellEl = document.querySelector(`[data-total-sell="${index}"]`);
      if (sellEl) sellEl.textContent = formatCurrency(totalSell)+'₾';
      renderDeliverySummary();
    }

    async function saveDeliveryChanges() {
      if (!currentDelivery || currentDelivery.status==='completed') return;
      if (!hasChanges) { alert('no changes to save'); return; }
      const items = currentDelivery.items.map(it=>({ id:it.id, quantity:Number(it.quantity)||0 }));
      const result = await apiPost('updateDelivery', { id:currentDeliveryId, items });
      if (result.success) {
        hasChanges = false;
        await viewDelivery(currentDeliveryId);
        loadDeliveries();
      } else alert('error: '+(result.error||'unknown'));
    }

    // ============================================================
    // NEW DELIVERY
    // ============================================================
    async function showNewDelivery() {
      showPage('new-delivery');
      const dateInput = document.getElementById('deliveryDate');
      if (dateInput) {
        const norm = normalizeDeliveryDate(dateInput.value);
        dateInput.value = norm || normalizeDeliveryDate(new Date().toISOString());
      }
      const formEl = document.getElementById('productsForm');
      formEl.innerHTML = '<div class="loading">loading products…</div>';

      const result = await apiCall('getProducts');
      if (!result.success || !result.data) {
        formEl.innerHTML = '<div class="empty">error loading products</div>';
        return;
      }

      allProducts = result.data.filter(p=>p.active);

      const rows = allProducts.map(p => `
        <tr data-id="${p.id}">
          <td>
            <div class="td-name">${p.name}</div>
            <div class="td-sub">${p.unit}</div>
          </td>
          <td class="td-muted">${(p.sell_price||0).toFixed(2)}₾</td>
          <td class="td-muted">${(p.cost_price||0).toFixed(2)}₾</td>
          <td><input type="number" step="0.5" min="0" value="0" placeholder="0" class="qty-input" data-product="${p.id}"></td>
        </tr>`).join('');

      formEl.innerHTML = `
        <table class="data-table">
          <thead><tr><th>product</th><th>sell ₾</th><th>cost ₾</th><th>qty</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function saveDelivery() {
      const dateInput = document.getElementById('deliveryDate');
      const date = normalizeDeliveryDate(dateInput?.value||'');
      if (!date) { alert('select delivery date'); return; }

      const items = [];
      document.querySelectorAll('#productsForm [data-product]').forEach(inp => {
        const qty = parseFloat(inp.value)||0;
        if (qty>0) {
          const product = allProducts.find(p=>String(p.id)===String(inp.dataset.product));
          if (product) items.push({ product_id:inp.dataset.product, quantity:qty, cost_price:product.cost_price||0, sell_price:product.sell_price||0 });
        }
      });

      if (items.length===0) { alert('add at least one product'); return; }

      const result = await apiPost('createDelivery', { date, items, created_by:currentUser, payment_status:'unpaid' });
      if (result.success) { showPage('home'); loadDeliveries(); }
      else alert('error: '+(result.error||'unknown'));
    }

    // ============================================================
    // ADMIN
    // ============================================================
    async function loadAdminProducts() {
      const el = document.getElementById('adminProductsList');
      el.innerHTML = '<div class="loading">loading…</div>';
      const result = await apiCall('getProducts');
      if (!result.success || !result.data) { el.innerHTML='<div class="empty">error loading</div>'; return; }

      const rows = result.data.filter(p=>p.active).map(p => `
        <tr>
          <td><div class="td-name">${p.name}</div><div class="td-sub">${p.unit}</div></td>
          <td><input type="number" step="0.1" value="${p.cost_price||0}" class="qty-input"
            onchange="updateProductPrice('${p.id}','cost_price',this.value)" placeholder="cost"></td>
          <td><input type="number" step="0.1" value="${p.sell_price||0}" class="qty-input"
            onchange="updateProductPrice('${p.id}','sell_price',this.value)" placeholder="sell"></td>
          <td><button class="btn btn-primary btn-sm" onclick="saveProductRow('${p.id}',this)">save</button></td>
        </tr>`).join('');

      el.innerHTML = `
        <table class="data-table">
          <thead><tr><th>product</th><th>cost ₾</th><th>sell ₾</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function saveProductRow(id, btn) {
      const row = btn.closest('tr');
      const inputs = row.querySelectorAll('input[type="number"]');
      const cost = parseFloat(inputs[0].value)||0;
      const sell = parseFloat(inputs[1].value)||0;
      const result = await apiCall('getProducts');
      if (!result.success) return;
      const product = result.data.find(p=>String(p.id)===String(id));
      if (!product) return;
      product.cost_price = cost;
      product.sell_price = sell;
      await apiPost('updateProduct', product);
      btn.textContent = '✓ saved';
      setTimeout(()=>{ btn.textContent = 'save'; }, 2000);
    }

    async function updateProductPrice(id, field, value) {
      // kept for inline onchange compat; actual save is via saveProductRow
    }

    async function loadAuditLog() {
      const el = document.getElementById('auditLogList');
      el.innerHTML = '<div class="loading">loading…</div>';
      const result = await apiCall('getAuditLog');
      if (!result.success || !result.data || result.data.length===0) {
        el.innerHTML = '<div class="empty">no logs</div>';
        return;
      }
      const rows = result.data.slice().reverse().slice(0,50).map(log => {
        const ts = formatDateTime(log.timestamp)||log.timestamp;
        return `
          <tr>
            <td class="td-muted" style="font-size:12px;font-variant-numeric:tabular-nums">${ts}</td>
            <td><span class="badge badge-${log.user==='admin'?'unpaid':'paid'}">${log.user}</span></td>
            <td class="td-name" style="font-size:12px">${log.action}</td>
            <td class="td-muted" style="font-size:12px">${log.entity} #${log.entity_id}</td>
            <td class="td-muted" style="font-size:11px">${log.details}</td>
          </tr>`;
      }).join('');
      el.innerHTML = `
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr><th>time</th><th>user</th><th>action</th><th>entity</th><th>details</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // ============================================================
    // INIT
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      const savedRole = sessionStorage.getItem('userRole');
      if (savedRole && AUTH[savedRole]) {
        currentUser = savedRole;
        currentRole = savedRole;
        document.getElementById('header').style.display = 'block';
        document.getElementById('roleDisplay').textContent = savedRole;
        document.getElementById('bottomNav').style.display = 'flex';
        buildNav();
        if (savedRole==='admin') showPage('admin');
        else { showPage('home'); loadDeliveries(); }
      } else {
        showPage('login');
      }

      const dateInput = document.getElementById('deliveryDate');
      if (dateInput && !dateInput.value) {
        dateInput.value = normalizeDeliveryDate(new Date().toISOString());
      }

      // observe page changes to load admin sub-pages
      const observer = new MutationObserver(() => {
        const adminP = document.querySelector('[data-page="admin-products"]');
        const adminL = document.querySelector('[data-page="admin-log"]');
        if (adminP?.style.display==='block' && !adminP.dataset.loaded) {
          adminP.dataset.loaded = 'true'; loadAdminProducts();
        }
        if (adminL?.style.display==='block' && !adminL.dataset.loaded) {
          adminL.dataset.loaded = 'true'; loadAuditLog();
        }
      });
      observer.observe(document.body, { attributes:true, subtree:true, attributeFilter:['style'] });
    });
  </script>
</body>
</html>
